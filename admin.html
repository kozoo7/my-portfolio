<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="images/your-logo.png" alt="Portfolio Logo" class="logo-image">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">View site</a></li>
            </ul>
        </nav>
    </header>

    <main class="detailed-about" style="padding-top:120px;">
        <div class="container">
            <h1 class="page-title">Admin: Manage Projects</h1>

            <section class="about-grid" style="grid-template-columns: 2fr 3fr;">
                <div class="about-card">
                    <h2>Settings</h2>
                    <p class="path-intro">Select a category, then add, edit, or delete projects. Changes are saved to the server JSON file.</p>

                    <div class="form-group" style="margin-top:1.5rem;">
                        <label for="adminToken">Admin token (saved locally)</label>
                        <input type="password" id="adminToken" placeholder="Enter admin token">
                    </div>
                    <button id="saveTokenBtn" class="submit-btn" style="margin-top:0.5rem;">Save Token</button>

                    <div class="form-group" style="margin-top:2rem;">
                        <label for="categorySelectAdmin">Category</label>
                        <select id="categorySelectAdmin">
                            <option value="motion-infographic">Motion Graphics / Infographic</option>
                            <option value="vfx-3d">VFX & 3D</option>
                            <option value="logo-animation">Logo Animation</option>
                            <option value="brand-identity">Brand Identity / Logos</option>
                            <option value="playing-cards">Playing Cards</option>
                            <option value="post-designs">Post Designs</option>
                        </select>
                    </div>
                    <button id="loadProjectsBtn" class="submit-btn" style="margin-top:0.5rem;">Load Projects</button>
                    <p id="adminStatus" style="margin-top:1rem; opacity:0.8;"></p>
                </div>

                <div class="about-card">
                    <h2>Projects in Category</h2>

                    <div id="projectsList"></div>

                    <hr style="margin:2rem 0; border-color:rgba(255,255,255,0.1);">

                    <h2 id="formTitle">Add New Project</h2>
                    <form id="projectForm" class="contact-form">
                        <input type="hidden" id="projectId">
                        <div class="form-group">
                            <input type="text" id="projectTitle" placeholder="Title" required>
                        </div>
                        <div class="form-group">
                            <textarea id="projectDescription" placeholder="Description"></textarea>
                        </div>
                        <div class="form-group">
                            <input type="url" id="projectMediaUrl" placeholder="Media URL (video or image)" required>
                        </div>
                        <div class="form-group">
                            <input type="url" id="projectThumbnailUrl" placeholder="Thumbnail URL (optional)">
                        </div>
                        <div class="form-group">
                            <select id="projectType">
                                <option value="video">Video</option>
                                <option value="image">Image</option>
                            </select>
                        </div>
                        <button type="submit" class="submit-btn">Save Project</button>
                        <button type="button" id="cancelEditBtn" class="submit-btn" style="margin-left:1rem; background:transparent; border:1px solid rgba(255,255,255,0.3);">Cancel</button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Noah's Design. Admin panel.</p>
        </div>
    </footer>

    <script src="js/admin.js"></script>
</body>
</html>
